<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUTTERS 食事管理</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f0eb; padding: 20px; min-height: 100vh; }
    h1 { font-size: 20px; color: #222; text-align: center; margin-bottom: 8px; padding-top: 12px; }
    .goal-bar { background: #1a1a2e; color: white; border-radius: 12px; padding: 12px 20px; text-align: center; margin-bottom: 16px; font-size: 14px; }
    .goal-bar span { font-size: 20px; font-weight: bold; color: #c8a97e; }
    .section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .section h2 { font-size: 15px; color: #555; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    input[type="text"], input[type="number"] { border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 15px; width: 100%; }
    input[type="text"] { flex: 2; }
    input[type="number"] { flex: 1; }
    .unit { font-size: 13px; color: #888; white-space: nowrap; }
    .tab-btns { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab-btn { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; color: #888; }
    .tab-btn.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .add-btn { background: none; border: 1px dashed #ccc; border-radius: 8px; padding: 10px; width: 100%; color: #aaa; font-size: 14px; cursor: pointer; margin-top: 4px; }
    .search-btn { background: #c8a97e; color: white; border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .search-btn:disabled { background: #ddd; }
    .pfc-result { display: flex; justify-content: space-around; margin-top: 12px; padding: 12px; background: #f5f0eb; border-radius: 10px; }
    .pfc-item { text-align: center; }
    .pfc-label { font-size: 11px; color: #888; }
    .pfc-value { font-size: 20px; font-weight: bold; color: #333; }
    .pfc-unit { font-size: 11px; color: #888; }
    .manual-pfc { display: flex; gap: 6px; margin-top: 8px; }
    .manual-pfc input { flex: 1; font-size: 13px; padding: 8px; }
    .manual-pfc .label { font-size: 11px; color: #888; text-align: center; }
    .checklist-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
    .checklist-item label { font-size: 15px; color: #333; cursor: pointer; }
    .checklist-item input[type="checkbox"]:checked + label { color: #aaa; text-decoration: line-through; }
    .submit-btn { background: #1a1a2e; color: white; border: none; border-radius: 12px; padding: 16px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .submit-btn:active { opacity: 0.8; }
    #message { text-align: center; color: #c8a97e; margin-top: 12px; font-size: 14px; }
    .food-row-pfc { font-size: 11px; color: #c8a97e; margin-bottom: 6px; padding-left: 4px; }
  </style>
</head>
<body>
  <h1>PUTTERS 食事管理</h1>

  <!-- 目標体重バー -->
  <div class="goal-bar" id="goal-bar" style="display:none">
    目標まであと <span id="goal-diff">-</span> kg
  </div>

  <!-- 体重 -->
  <div class="section">
    <h2>⚖️ 今日の体重</h2>
    <div class="row">
      <input type="number" id="weight" placeholder="65.0" step="0.1" oninput="updateGoalBar(); saveCache()">
      <span class="unit">kg</span>
    </div>
    <div style="margin-top:8px; display:flex; align-items:center; gap:8px;">
      <span style="font-size:13px; color:#888;">目標体重</span>
      <input type="number" id="goal-weight" placeholder="60.0" step="0.1" style="flex:1; font-size:13px; padding:8px;" oninput="updateGoalBar(); saveGoalWeight(); saveCache()">
      <span class="unit">kg</span>
    </div>
  </div>

  <!-- 体温 -->
  <div class="section">
    <h2>🌡️ 今日の体温</h2>
    <div class="row">
      <input type="number" id="temperature" placeholder="36.5" step="0.1" oninput="saveCache()">
      <span class="unit">℃</span>
    </div>
  </div>

  <!-- 食事 -->
  <div class="section">
    <h2>🍽️ 今日食べたもの</h2>

    <!-- タブ -->
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('food')">🥩 食材</button>
      <button class="tab-btn" onclick="switchTab('restaurant')">🏪 外食</button>
    </div>

    <!-- 食材タブ -->
    <div id="tab-food" class="tab-content active">
      <div id="food-list"></div>
      <button class="add-btn" onclick="addFoodRow()">＋ 食材を追加</button>
    </div>

    <!-- 外食タブ -->
    <div id="tab-restaurant" class="tab-content">
      <div id="restaurant-list"></div>
      <button class="add-btn" onclick="addRestaurantRow()">＋ 外食を追加</button>
    </div>

    <!-- その他（手動PFC入力） -->
    <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee;">
      <div style="font-size: 13px; color: #888; margin-bottom: 8px;">その他（PFCを直接入力）</div>
      <div id="manual-pfc-list"></div>
      <button class="add-btn" onclick="addManualPFCRow()" style="margin-top:4px;">＋ PFCを追加</button>
    </div>

    <div class="pfc-result">
      <div class="pfc-item"><div class="pfc-label">タンパク質</div><div class="pfc-value" id="total-p">0</div><div class="pfc-unit">g</div></div>
      <div class="pfc-item"><div class="pfc-label">脂質</div><div class="pfc-value" id="total-f">0</div><div class="pfc-unit">g</div></div>
      <div class="pfc-item"><div class="pfc-label">炭水化物</div><div class="pfc-value" id="total-c">0</div><div class="pfc-unit">g</div></div>
      <div class="pfc-item"><div class="pfc-label">カロリー</div><div class="pfc-value" id="total-kcal">0</div><div class="pfc-unit">kcal</div></div>
    </div>
  </div>

  <!-- 有酸素 -->
  <div class="section">
    <h2>🏃 有酸素運動</h2>
    <div class="row">
      <input type="number" id="cardio" placeholder="0" min="0" oninput="saveCache()">
      <span class="unit">分</span>
    </div>
  </div>

  <!-- 宿題チェックリスト -->
  <div class="section">
    <h2>📋 今日の宿題</h2>
    <div id="checklist">
      <p style="color:#aaa; font-size:14px;">読み込み中...</p>
    </div>
  </div>

  <button class="submit-btn" onclick="submitData()">今日の記録を送る</button>
  <p id="message"></p>

  <script>
    const LIFF_ID = '2009746243-PAAQuZkb';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnDYL8RT3pFxetCwig3LtDIatUvruamQrGF2B99zPVDfVBeN6KgtZobpLFj2T8ZQfe/exec';
    const CACHE_KEY = 'putters_cache';

    const pfcCache = {};
    const restaurantPfcCache = {};
    let currentTasks = [];

    const defaultTasks = [
      '朝食を食べた', '水を1.5L以上飲んだ', '有酸素運動をした', '腹筋トレーニングをした', '早寝した（23時前）'
    ];

    // タブ切り替え
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    // 目標体重バー更新
    function updateGoalBar() {
      const w = parseFloat(document.getElementById('weight').value);
      const g = parseFloat(document.getElementById('goal-weight').value);
      const bar = document.getElementById('goal-bar');
      if (!isNaN(w) && !isNaN(g)) {
        const diff = (w - g).toFixed(1);
        document.getElementById('goal-diff').textContent = diff > 0 ? diff : '達成！';
        bar.style.display = 'block';
      } else {
        bar.style.display = 'none';
      }
    }

    // 目標体重は別途永続保存
    function saveGoalWeight() {
      const g = document.getElementById('goal-weight').value;
      if (g) localStorage.setItem('putters_goal_weight', g);
    }

    function loadGoalWeight() {
      const g = localStorage.getItem('putters_goal_weight');
      if (g) {
        document.getElementById('goal-weight').value = g;
        updateGoalBar();
      }
    }

    // localStorageキャッシュ保存
    function saveCache() {
      const data = {
        date: new Date().toDateString(),
        weight: document.getElementById('weight').value,
        goalWeight: document.getElementById('goal-weight').value,
        temperature: document.getElementById('temperature').value,
        cardio: document.getElementById('cardio').value,
        manualPFCs: Array.from(document.querySelectorAll('.manual-pfc-row')).map(row => ({
          p: row.querySelector('.mpfc-p').value,
          f: row.querySelector('.mpfc-f').value,
          c: row.querySelector('.mpfc-c').value
        })),
        foods: [],
        restaurants: []
      };
      document.querySelectorAll('.food-entry').forEach(entry => {
        data.foods.push({
          name: entry.querySelector('.food-name').value,
          gram: entry.querySelector('.food-gram').value
        });
      });
      document.querySelectorAll('.restaurant-entry').forEach(entry => {
        data.restaurants.push({
          text: entry.querySelector('.restaurant-name').value
        });
      });
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    }

    // localStorageキャッシュ復元
    async function loadCache() {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        const today = new Date().toDateString();
        if (data.date && data.date !== today) {
          localStorage.removeItem(CACHE_KEY);
          return;
        }
        if (data.weight) document.getElementById('weight').value = data.weight;
        if (data.goalWeight) document.getElementById('goal-weight').value = data.goalWeight;
        if (data.temperature) document.getElementById('temperature').value = data.temperature;
        if (data.cardio) document.getElementById('cardio').value = data.cardio;
        if (data.manualPFCs && data.manualPFCs.length > 0) {
          data.manualPFCs.forEach(m => addManualPFCRow(m.p, m.f, m.c));
        }
        // 食材行を復元してPFCも再取得
        const pfcPromises = [];
        if (data.foods && data.foods.length > 0) {
          for (const f of data.foods) {
            const idx = addFoodRow(f.name, f.gram);
            if (f.name) pfcPromises.push(searchPFCSilent(idx, f.name));
          }
        }
        if (data.restaurants && data.restaurants.length > 0) {
          for (const r of data.restaurants) {
            const idx = addRestaurantRow(r.text);
            if (r.text) pfcPromises.push(searchRestaurantPFCSilent(idx, r.text));
          }
        }
        await Promise.all(pfcPromises);
        updateGoalBar();
        calcTotal();
      } catch (e) { console.log('cache load error:', e); }
    }

    // PFC取得（サイレント版・キャッシュ復元用）
    async function searchPFCSilent(idx, name) {
      try {
        const res = await fetch('/api/pfc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ food: name }) });
        const pfc = await res.json();
        pfcCache[idx] = pfc;
        const rowEl = document.getElementById(`pfc-row-${idx}`);
        if (rowEl) {
          const gram = parseFloat(document.querySelector(`.food-gram[data-idx="${idx}"]`).value) || 100;
          const r = gram / 100;
          rowEl.textContent = `${gram}gで P:${(pfc.p*r).toFixed(1)}g F:${(pfc.f*r).toFixed(1)}g C:${(pfc.c*r).toFixed(1)}g ${Math.round(pfc.kcal*r)}kcal`;
        }
      } catch (e) {}
    }

    async function searchRestaurantPFCSilent(idx, name) {
      try {
        const res = await fetch('/api/pfc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ food: name }) });
        const pfc = await res.json();
        restaurantPfcCache[idx] = pfc;
        const rowEl = document.getElementById(`rpfc-row-${idx}`);
        if (rowEl) rowEl.textContent = `推定 P:${pfc.p}g F:${pfc.f}g C:${pfc.c}g ${pfc.kcal}kcal`;
      } catch (e) {}
    }

    // 食材行追加
    function addFoodRow(name = '', gram = '') {
      const list = document.getElementById('food-list');
      const idx = 'f' + Date.now() + list.children.length;
      const div = document.createElement('div');
      div.className = 'food-entry';
      div.innerHTML = `
        <div class="row">
          <input type="text" placeholder="食材名（例：白米、鶏むね肉）" class="food-name" data-idx="${idx}" value="${name}" oninput="saveCache()">
          <input type="number" placeholder="量(g)" class="food-gram" data-idx="${idx}" value="${gram}" oninput="calcTotal(); saveCache()">
          <button class="search-btn" onclick="searchPFC('${idx}')">調べる</button>
          <button onclick="removeFoodRow(this, '${idx}')" style="background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;">×</button>
        </div>
        <div class="food-row-pfc" id="pfc-row-${idx}"></div>
      `;
      list.appendChild(div);
      return idx;
    }

    function removeFoodRow(btn, idx) {
      btn.closest('.food-entry').remove();
      delete pfcCache[idx];
      calcTotal();
      saveCache();
    }

    // 外食行追加
    function addRestaurantRow(text = '') {
      const list = document.getElementById('restaurant-list');
      const idx = 'r' + Date.now() + list.children.length;
      const div = document.createElement('div');
      div.className = 'restaurant-entry';
      div.innerHTML = `
        <div class="row">
          <input type="text" placeholder="例：はま寿司 マグロ 1皿" class="restaurant-name" data-idx="${idx}" value="${text}" oninput="saveCache()">
          <button class="search-btn" onclick="searchRestaurantPFC('${idx}')">調べる</button>
          <button onclick="removeRestaurantRow(this, '${idx}')" style="background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;">×</button>
        </div>
        <div class="food-row-pfc" id="rpfc-row-${idx}"></div>
      `;
      list.appendChild(div);
      return idx;
    }

    function removeRestaurantRow(btn, idx) {
      btn.closest('.restaurant-entry').remove();
      delete restaurantPfcCache[idx];
      calcTotal();
      saveCache();
    }

    async function searchPFC(idx) {
      const nameEl = document.querySelector(`.food-name[data-idx="${idx}"]`);
      const gramEl = document.querySelector(`.food-gram[data-idx="${idx}"]`);
      const btn = nameEl.parentElement.querySelector('.search-btn');
      const name = nameEl.value.trim();
      if (!name) return;
      btn.disabled = true; btn.textContent = '...';
      try {
        const res = await fetch('/api/pfc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ food: name }) });
        const pfc = await res.json();
        pfcCache[idx] = pfc;
        const gram = parseFloat(document.querySelector(`.food-gram[data-idx="${idx}"]`).value) || 100;
        const r = gram / 100;
        document.getElementById(`pfc-row-${idx}`).textContent = `${gram}gで P:${(pfc.p*r).toFixed(1)}g F:${(pfc.f*r).toFixed(1)}g C:${(pfc.c*r).toFixed(1)}g ${Math.round(pfc.kcal*r)}kcal`;
        calcTotal();
      } catch (e) { document.getElementById(`pfc-row-${idx}`).textContent = '取得できませんでした'; }
      btn.disabled = false; btn.textContent = '調べる';
    }

    async function searchRestaurantPFC(idx) {
      const nameEl = document.querySelector(`.restaurant-name[data-idx="${idx}"]`);
      const btn = nameEl.parentElement.querySelector('.search-btn');
      const name = nameEl.value.trim();
      if (!name) return;
      btn.disabled = true; btn.textContent = '...';
      try {
        const res = await fetch('/api/pfc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ food: name }) });
        const pfc = await res.json();
        restaurantPfcCache[idx] = pfc;
        document.getElementById(`rpfc-row-${idx}`).textContent = `推定 P:${pfc.p}g F:${pfc.f}g C:${pfc.c}g ${pfc.kcal}kcal`;
        calcTotal();
      } catch (e) { document.getElementById(`rpfc-row-${idx}`).textContent = '取得できませんでした'; }
      btn.disabled = false; btn.textContent = '調べる';
    }

    // 手動PFC行追加
    function addManualPFCRow(p = '', f = '', c = '') {
      const list = document.getElementById('manual-pfc-list');
      const idx = 'm' + Date.now() + list.children.length;
      const div = document.createElement('div');
      div.className = 'manual-pfc-row';
      div.style.cssText = 'display:flex; gap:6px; margin-bottom:8px; align-items:flex-end;';
      div.innerHTML = `
        <div style="flex:1"><div class="label">P(g)</div><input type="number" class="mpfc-p" placeholder="0" step="0.1" value="${p}" oninput="updateManualKcal(this); calcTotal(); saveCache()"></div>
        <div style="flex:1"><div class="label">F(g)</div><input type="number" class="mpfc-f" placeholder="0" step="0.1" value="${f}" oninput="updateManualKcal(this); calcTotal(); saveCache()"></div>
        <div style="flex:1"><div class="label">C(g)</div><input type="number" class="mpfc-c" placeholder="0" step="0.1" value="${c}" oninput="updateManualKcal(this); calcTotal(); saveCache()"></div>
        <div style="flex:1"><div class="label">kcal</div><input type="number" class="mpfc-kcal" placeholder="自動" step="1" readonly style="background:#f5f0eb; color:#888;"></div>
        <button onclick="removeManualPFCRow(this)" style="background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;margin-bottom:2px;">×</button>
      `;
      list.appendChild(div);
      if (p || f || c) updateManualKcal(div.querySelector('.mpfc-p'));
      return idx;
    }

    function updateManualKcal(el) {
      const row = el.closest('.manual-pfc-row');
      const p = parseFloat(row.querySelector('.mpfc-p').value) || 0;
      const f = parseFloat(row.querySelector('.mpfc-f').value) || 0;
      const c = parseFloat(row.querySelector('.mpfc-c').value) || 0;
      row.querySelector('.mpfc-kcal').value = Math.round(p * 4 + f * 9 + c * 4) || '';
    }

    function removeManualPFCRow(btn) {
      btn.closest('.manual-pfc-row').remove();
      calcTotal();
      saveCache();
    }

    function calcTotal() {
      let p = 0, f = 0, c = 0, kcal = 0;

      document.querySelectorAll('.food-gram').forEach(gramEl => {
        const idx = gramEl.dataset.idx;
        const gram = parseFloat(gramEl.value) || 0;
        if (pfcCache[idx] && gram > 0) {
          const r = gram / 100;
          p += pfcCache[idx].p * r; f += pfcCache[idx].f * r;
          c += pfcCache[idx].c * r; kcal += pfcCache[idx].kcal * r;
        }
      });

      Object.values(restaurantPfcCache).forEach(pfc => {
        p += pfc.p; f += pfc.f; c += pfc.c; kcal += pfc.kcal;
      });

      document.querySelectorAll('.manual-pfc-row').forEach(row => {
        const mp = parseFloat(row.querySelector('.mpfc-p').value) || 0;
        const mf = parseFloat(row.querySelector('.mpfc-f').value) || 0;
        const mc = parseFloat(row.querySelector('.mpfc-c').value) || 0;
        p += mp; f += mf; c += mc;
        kcal += mp * 4 + mf * 9 + mc * 4;
      });

      document.getElementById('total-p').textContent = p.toFixed(1);
      document.getElementById('total-f').textContent = f.toFixed(1);
      document.getElementById('total-c').textContent = c.toFixed(1);
      document.getElementById('total-kcal').textContent = Math.round(kcal);
    }

    async function initChecklist(userName) {
      const container = document.getElementById('checklist');
      let tasks = defaultTasks;
      if (userName && userName !== '不明') {
        try {
          const res = await fetch(GAS_URL + '?name=' + encodeURIComponent(userName));
          const data = await res.json();
          if (data.tasks && data.tasks.length > 0) tasks = data.tasks;
        } catch (e) {}
      }
      currentTasks = tasks;
      container.innerHTML = '';
      tasks.forEach((task, i) => {
        const div = document.createElement('div');
        div.className = 'checklist-item';
        div.innerHTML = `<input type="checkbox" id="task-${i}"><label for="task-${i}">${task}</label>`;
        container.appendChild(div);
      });
    }

    async function submitData() {
      const weight = document.getElementById('weight').value;
      const goalWeight = document.getElementById('goal-weight').value;
      const temperature = document.getElementById('temperature').value;
      const cardio = document.getElementById('cardio').value;

      let foods = [];
      document.querySelectorAll('.food-entry').forEach(entry => {
        const name = entry.querySelector('.food-name').value.trim();
        const gram = entry.querySelector('.food-gram').value;
        if (name) foods.push(name + ' ' + (gram || 0) + 'g');
      });
      document.querySelectorAll('.restaurant-entry').forEach(entry => {
        const name = entry.querySelector('.restaurant-name').value.trim();
        if (name) foods.push('[外食] ' + name);
      });

      const p = document.getElementById('total-p').textContent;
      const f = document.getElementById('total-f').textContent;
      const c = document.getElementById('total-c').textContent;
      const kcal = document.getElementById('total-kcal').textContent;

      let checkedTasks = [], uncheckedTasks = [];
      currentTasks.forEach((task, i) => {
        if (document.getElementById('task-' + i) && document.getElementById('task-' + i).checked) {
          checkedTasks.push(task);
        } else {
          uncheckedTasks.push(task);
        }
      });

      document.getElementById('message').textContent = '送信中...';

      let userName = '不明';
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          userName = profile.displayName;
        } else { liff.login(); return; }
      } catch (e) {}

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ name: userName, weight, goalWeight, temperature, foods: foods.join(', '), p, f, c, kcal, cardio, checkedTasks: checkedTasks.join('、'), uncheckedTasks: uncheckedTasks.join('、') })
        });
        document.getElementById('message').textContent = '✅ 記録しました！';
        localStorage.removeItem(CACHE_KEY); // 送信後に日次キャッシュ削除（目標体重は残す）
      } catch (e) {
        document.getElementById('message').textContent = '❌ 送信に失敗しました';
      }
    }

    // 初期PFC行追加
    function initManualPFC() {
      if (document.getElementById('manual-pfc-list').children.length === 0) {
        addManualPFCRow();
      }
    }

    // 初期化
    liff.init({ liffId: LIFF_ID }).then(async () => {
      let userName = '不明';
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userName = profile.displayName;
      }
      await initChecklist(userName);
    }).catch(e => { initChecklist('不明'); });

    loadGoalWeight();
    loadCache().then(() => {
      if (document.getElementById('food-list').children.length === 0) addFoodRow();
      if (document.getElementById('manual-pfc-list').children.length === 0) addManualPFCRow();
    });
  </script>
</body>
</html>

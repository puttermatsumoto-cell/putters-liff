<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUTTERS 予約確認</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f0eb; padding: 20px; min-height: 100vh; }
    .back { display: inline-flex; align-items: center; gap: 6px; color: #888; font-size: 14px; text-decoration: none; margin-bottom: 16px; }
    h1 { font-size: 20px; color: #222; text-align: center; margin-bottom: 12px; padding-top: 12px; }
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .month-nav button { background: none; border: none; font-size: 22px; color: #888; cursor: pointer; padding: 4px 10px; }
    .month-nav button:disabled { color: #ddd; }
    .month-nav span { font-size: 16px; font-weight: bold; color: #1a1a2e; min-width: 100px; text-align: center; }
    .section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .empty { text-align: center; color: #aaa; font-size: 14px; padding: 32px 0; }
    .schedule-item { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-date { text-align: center; min-width: 44px; }
    .schedule-date .day { font-size: 24px; font-weight: bold; color: #1a1a2e; line-height: 1; }
    .schedule-date .weekday { font-size: 11px; color: #aaa; margin-top: 2px; }
    .schedule-time { font-size: 15px; color: #555; }
    .today-badge { background: #c8a97e; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .schedule-item.past { opacity: 0.35; }
    .loading { text-align: center; color: #aaa; padding: 40px; }
    .book-link { display: block; background: #1a1a2e; color: white; text-align: center; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: bold; text-decoration: none; margin-bottom: 16px; }
  </style>
</head>
<body>
  <a href="/" class="back">← 戻る</a>
  <h1>📅 予約確認</h1>

  <a href="/book.html" class="book-link" id="book-link" style="display:none">📅 予約する</a>

  <div class="month-nav">
    <button id="btn-prev" onclick="changeMonth(-1)">‹</button>
    <span id="month-label"></span>
    <button id="btn-next" onclick="changeMonth(1)">›</button>
  </div>

  <div class="section">
    <div id="loading" class="loading">読み込み中...</div>
    <div id="schedule-list"></div>
  </div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnDYL8RT3pFxetCwig3LtDIatUvruamQrGF2B99zPVDfVBeN6KgtZobpLFj2T8ZQfe/exec';
  const NAME_KEY = 'putters_user_name';
  const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];

  const now = new Date();
  let currentYear = now.getFullYear();
  let currentMonth = now.getMonth(); // 0-indexed

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    // 過去には戻れないようにする（今月より前はボタン無効）
    const isCurrentMonth = currentYear === now.getFullYear() && currentMonth === now.getMonth();
    document.getElementById('btn-prev').disabled = isCurrentMonth;
    load();
  }

  async function load() {
    const name = localStorage.getItem(NAME_KEY);
    if (!name) {
      document.getElementById('loading').textContent = '名前が設定されていません。';
      return;
    }

    const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
    const todayStr = now.toISOString().slice(0, 10);
    document.getElementById('month-label').textContent = `${currentYear}年${currentMonth+1}月`;

    const loading = document.getElementById('loading');
    const list = document.getElementById('schedule-list');
    loading.style.display = 'block';
    loading.textContent = '読み込み中...';
    list.innerHTML = '';

    try {
      const res = await fetch(`${GAS_URL}?action=user_schedule&name=${encodeURIComponent(name)}&month=${monthStr}`);
      const data = await res.json();
      loading.style.display = 'none';

      if (data.length === 0) {
        list.innerHTML = '<div class="empty">この月の予約はありません</div>';
        return;
      }

      data.sort((a, b) => a.date.localeCompare(b.date));
      data.forEach(item => {
        const d = new Date(item.date + 'T00:00:00');
        const isToday = item.date === todayStr;
        const isPast = item.date < todayStr;
        const div = document.createElement('div');
        div.className = 'schedule-item' + (isPast ? ' past' : '');
        div.innerHTML = `
          <div class="schedule-date">
            <div class="day">${d.getDate()}</div>
            <div class="weekday">${WEEKDAYS[d.getDay()]}</div>
          </div>
          <div>
            <div class="schedule-time">${item.time}〜${isToday ? '<span class="today-badge">今日</span>' : ''}</div>
          </div>
        `;
        list.appendChild(div);
      });
    } catch (e) {
      loading.textContent = '読み込みに失敗しました';
    }
  }

  // シフト制チェック＋翌月スロットを先読み
  async function checkShift() {
    const name = localStorage.getItem(NAME_KEY);
    if (!name) return;
    try {
      const res = await fetch(`${GAS_URL}?action=check_shift&name=${encodeURIComponent(name)}`);
      const data = await res.json();
      if (data.isShift) {
        document.getElementById('book-link').style.display = 'block';
        // 翌月スロットをバックグラウンドで先読みしてlocalStorageに保存
        const nextDate = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        const nextMonth = `${nextDate.getFullYear()}-${String(nextDate.getMonth()+1).padStart(2,'0')}`;
        fetch(`${GAS_URL}?action=month_slots&month=${nextMonth}`)
          .then(r => r.json())
          .then(slots => {
            localStorage.setItem('putters_month_cache_' + nextMonth, JSON.stringify(slots));
          }).catch(() => {});
      }
    } catch (e) {}
  }

  // 初期化：今月は‹ボタン無効
  document.getElementById('btn-prev').disabled = true;
  load();
  checkShift();
</script>
</body>
</html>

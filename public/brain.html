<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脳トレ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f0eb; padding: 20px; min-height: 100vh; }
    .back { display: inline-flex; align-items: center; gap: 6px; color: #888; font-size: 14px; text-decoration: none; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #1a1a2e; text-align: center; margin-bottom: 8px; font-weight: 700; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }

    /* カレンダー */
    .calendar-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-header button { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 0 8px; }
    .cal-header span { font-size: 15px; font-weight: bold; color: #1a1a2e; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .cal-day-label { font-size: 11px; color: #aaa; padding: 4px 0; }
    .cal-day { font-size: 13px; color: #555; padding: 6px 0; border-radius: 8px; }
    .cal-day.empty { color: transparent; }
    .cal-day.done { background: #c8a97e; color: white; font-weight: bold; border-radius: 8px; }
    .cal-day.today { border: 2px solid #1a1a2e; border-radius: 8px; }

    /* 難易度選択 */
    .level-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .level-section h2 { font-size: 14px; color: #888; margin-bottom: 12px; }
    .level-btns { display: flex; gap: 8px; }
    .level-btn { flex: 1; padding: 12px 0; border: 2px solid #eee; border-radius: 12px; background: white; font-size: 13px; color: #555; cursor: pointer; font-weight: bold; }
    .level-btn.selected { border-color: #1a1a2e; background: #1a1a2e; color: white; }

    /* 問題エリア */
    .quiz-card { background: white; border-radius: 16px; padding: 24px 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .quiz-scene { font-size: 15px; color: #1a1a2e; line-height: 2; text-align: center; margin-bottom: 20px; }
    .quiz-scene .highlight { color: #c8a97e; font-weight: bold; font-size: 17px; }
    .quiz-scene .enter { color: #4caf50; font-weight: bold; }
    .quiz-scene .exit { color: #e57373; font-weight: bold; }
    .quiz-question { font-size: 18px; font-weight: bold; color: #1a1a2e; text-align: center; margin-bottom: 20px; }

    /* 答え入力 */
    .answer-area { display: flex; gap: 8px; width: 100%; max-width: 280px; }
    .answer-area input { flex: 1; border: 2px solid #ddd; border-radius: 12px; padding: 12px; font-size: 18px; text-align: center; }
    .answer-area input:focus { outline: none; border-color: #1a1a2e; }
    .submit-btn { background: #1a1a2e; color: white; border: none; border-radius: 12px; padding: 12px 20px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .submit-btn:active { opacity: 0.8; }

    /* 結果 */
    .result { font-size: 20px; font-weight: bold; text-align: center; margin-top: 12px; }
    .result.correct { color: #4caf50; }
    .result.wrong { color: #e57373; }

    .next-btn { background: #c8a97e; color: white; border: none; border-radius: 12px; padding: 14px 40px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; }
    .start-btn { background: #1a1a2e; color: white; border: none; border-radius: 16px; padding: 16px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
    .start-btn:active { opacity: 0.8; }

    /* スコア */
    .score-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 8px; }
    .score-item { text-align: center; }
    .score-item .val { font-size: 24px; font-weight: bold; color: #1a1a2e; }
    .score-item .lbl { font-size: 11px; color: #aaa; }

    #toast { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #c8a97e; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; }
  </style>
</head>
<body>
  <a href="/" class="back">← 戻る</a>
  <h1>🧠 脳トレ</h1>
  <p class="subtitle">人の出入りを数えよう</p>

  <!-- カレンダー -->
  <div class="calendar-card">
    <div class="cal-header">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="cal-title"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- 難易度 -->
  <div class="level-section">
    <h2>難易度</h2>
    <div class="level-btns">
      <button class="level-btn selected" onclick="setLevel(1, this)">かんたん</button>
      <button class="level-btn" onclick="setLevel(2, this)">ふつう</button>
      <button class="level-btn" onclick="setLevel(3, this)">むずかしい</button>
    </div>
  </div>

  <!-- スコア -->
  <div class="score-row">
    <div class="score-item"><div class="val" id="score-correct">0</div><div class="lbl">正解</div></div>
    <div class="score-item"><div class="val" id="score-total">0</div><div class="lbl">問題数</div></div>
  </div>

  <!-- 問題 -->
  <div class="quiz-card" id="quiz-card">
    <button class="start-btn" onclick="startQuiz()">スタート</button>
  </div>

  <div id="toast"></div>

<script>
  const NAME_KEY = 'putters_user_name';
  const ALLOWED = ['松本大樹'];
  const userName = localStorage.getItem(NAME_KEY) || '';
  if (!ALLOWED.includes(userName)) {
    document.querySelector('.back').insertAdjacentHTML('afterend', '<div style="text-align:center;padding:40px;color:#aaa;font-size:15px;">このページは準備中です</div>');
    document.querySelector('h1').style.display = 'none';
    document.querySelector('.subtitle').style.display = 'none';
    document.querySelectorAll('.calendar-card, .level-section, .score-row, .quiz-card').forEach(el => el.style.display = 'none');
  }

  const CAL_KEY = 'putters_brain_done';
  let level = 1;
  let correct = 0;
  let total = 0;
  let currentAnswer = 0;
  let answered = false;
  let calYear, calMonth;

  function getDoneDates() {
    return JSON.parse(localStorage.getItem(CAL_KEY) || '[]');
  }
  function markToday() {
    const today = todayStr();
    const dates = getDoneDates();
    if (!dates.includes(today)) {
      dates.push(today);
      localStorage.setItem(CAL_KEY, JSON.stringify(dates));
    }
    renderCalendar();
  }
  function todayStr() {
    const now = new Date(new Date().getTime() + 9*60*60*1000);
    return now.toISOString().slice(0, 10);
  }

  function renderCalendar() {
    const now = new Date();
    if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }
    document.getElementById('cal-title').textContent = `${calYear}年${calMonth+1}月`;
    const done = getDoneDates();
    const todayS = todayStr();
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const labels = ['日','月','火','水','木','金','土'];
    let html = labels.map(l => `<div class="cal-day-label">${l}</div>`).join('');
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty">0</div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isDone = done.includes(ds);
      const isToday = ds === todayS;
      let cls = 'cal-day';
      if (isDone) cls += ' done';
      if (isToday) cls += ' today';
      html += `<div class="${cls}">${d}</div>`;
    }
    document.getElementById('cal-grid').innerHTML = html;
  }
  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  }

  function setLevel(l, btn) {
    level = l;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function generateQuiz() {
    // 難易度に応じてシーン数・人数を変える
    let scenes = [];
    let inside = 0;
    const maxIn = level === 1 ? 5 : level === 2 ? 10 : 15;
    const steps = level === 1 ? 3 : level === 2 ? 5 : 7;

    for (let i = 0; i < steps; i++) {
      const maxEnter = Math.min(maxIn - inside, level === 1 ? 3 : level === 2 ? 5 : 7);
      const maxExit = Math.min(inside, level === 1 ? 3 : level === 2 ? 4 : 6);
      const enter = Math.floor(Math.random() * (maxEnter + 1));
      inside += enter;
      let exit = Math.floor(Math.random() * (maxExit + 1));
      inside -= exit;
      scenes.push({ enter, exit });
    }
    currentAnswer = inside;
    return scenes;
  }

  function startQuiz() {
    answered = false;
    const scenes = generateQuiz();
    let html = `<div class="quiz-scene">`;
    html += `最初、部屋には <span class="highlight">0人</span> います。<br>`;
    scenes.forEach((s, i) => {
      if (s.enter > 0 && s.exit > 0) {
        html += `<span class="enter">${s.enter}人入り</span>、<span class="exit">${s.exit}人出ました。</span><br>`;
      } else if (s.enter > 0) {
        html += `<span class="enter">${s.enter}人入りました。</span><br>`;
      } else if (s.exit > 0) {
        html += `<span class="exit">${s.exit}人出ました。</span><br>`;
      }
    });
    html += `</div>`;
    html += `<div class="quiz-question">今、部屋に何人いる？</div>`;
    html += `<div class="answer-area">
      <input type="number" id="answer-input" min="0" placeholder="？">
      <button class="submit-btn" onclick="checkAnswer()">答える</button>
    </div>`;
    document.getElementById('quiz-card').innerHTML = html;
    document.getElementById('answer-input').focus();
    document.getElementById('answer-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAnswer();
    });
  }

  function checkAnswer() {
    if (answered) return;
    const val = parseInt(document.getElementById('answer-input').value);
    if (isNaN(val)) return;
    answered = true;
    total++;
    document.getElementById('score-total').textContent = total;
    const card = document.getElementById('quiz-card');
    let resultHtml = card.innerHTML;
    if (val === currentAnswer) {
      correct++;
      document.getElementById('score-correct').textContent = correct;
      resultHtml += `<div class="result correct">⭕ 正解！ ${currentAnswer}人</div>`;
      if (total % 3 === 0) markToday();
    } else {
      resultHtml += `<div class="result wrong">❌ 不正解… 正解は ${currentAnswer}人</div>`;
    }
    resultHtml += `<button class="next-btn" onclick="startQuiz()">次の問題</button>`;
    card.innerHTML = resultHtml;
  }

  renderCalendar();
</script>
</body>
</html>
